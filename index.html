<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>NOW LOADING...</title>

<style>

body{

background:#000;

color:white;

font-family:sans-serif;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

flex-direction:column;

</style>

</head>

<body>

<h1>NOW LOADING...</h1>

<p>Loading Audio...</p>

<audio id="player" controls autoplay></audio>

  <div id="finish" style="display:none; text-align:center; margin-top:40px;">

<hr>

<h2>ご視聴ありがとうございました。</h2>

<p>
こちらはSAMPLE音声です。<br><br>

劇場では各キャラクター5種類の<br>
限定ボイスをご用意しております。<br><br>

ぜひ劇場でお楽しみください。
</p>

<br>

<button onclick="location.reload()">
▶ もう一度聞く
</button>


</div>

<script>
const audioFiles = [

"daichi.wav",

"sample_1.wav"

];

const randomIndex=Math.floor(Math.random()*audioFiles.length);

const player=document.getElementById("player");

player.src=audioFiles[randomIndex]+"?"+Date.now();

player.load();

player.play();

player.onended=function(){

document.getElementById("finish").style.display="block";

}
</script>

</body>
