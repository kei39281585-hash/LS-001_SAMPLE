<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>NOW LOADING...</title>

<style>

body{

background:#000;

color:white;

font-family:sans-serif;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

flex-direction:column;

}

h1{

font-size:45px;

}

</style>

</head>

<body>

<h1>NOW LOADING...</h1>

<p>Loading Audio...</p>

<audio id="player" controls autoplay></audio>

<script>

const audioFiles = [
  "daich.wav",
  "akari.wav"
];

// ランダムに1つ選ぶ
const randomIndex = Math.floor(Math.random() * audioFiles.length);
const selectedAudio = audioFiles[randomIndex];

// デバッグ表示
console.log("選ばれた音声:", selectedAudio);

// プレイヤー取得
const player = document.getElementById("player");

// キャッシュ防止
player.src = selectedAudio + "?t=" + new Date().getTime();

// 読み込み
player.load();

// 自動再生（失敗してもエラーを出さない）
player.play().catch(() => {
  console.log("自動再生できませんでした");
});

</script>

</body>





  

</html>
