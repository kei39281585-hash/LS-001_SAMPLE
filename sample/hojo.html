<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>NOW LOADING...</title>

<style>

body{
    background:#000;
    color:white;
    font-family:sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    min-height:100vh;
    margin:0;
}

h1{
    font-size:48px;
    margin-bottom:5px;
}

h3{
    font-weight:normal;
    margin-top:0;
    margin-bottom:25px;
}

img{
    width:300px;
    border-radius:12px;
    box-shadow:0 0 20px rgba(255,255,255,.2);
}

button{
    padding:15px 35px;
    font-size:20px;
    cursor:pointer;
    border:none;
    border-radius:8px;
}

#finish{
    display:none;
    text-align:center;
    margin-top:35px;
}

.ticketButton{
    background:#ffcc00;
    color:#000;
    font-weight:bold;
    font-size:22px;
}

</style>

</head>

<body>

<h1>NOW LOADING...</h1>

<h3>谷澤 翼　SAMPLE VOICE</h3>

<img src="../flyer.jpg" alt="フライヤー">

<br><br>

<button id="startBtn">▶ START</button>

<br>

<audio id="player" controls style="display:none;"></audio>

<div id="finish">

<hr style="width:80%;">

<h2>ご視聴ありがとうございました。</h2>

<p>

こちらはSAMPLE音声です。<br><br>

本公演では<br>
各キャラクター5種類の限定音声を<br>
ご用意しております。<br><br>

またコンプリートパックでは<br>
ここでしか聞けない特別な掛け合いもご用意しております。<br><br>

ぜひ劇場でお楽しみください！

</p>

<br>

<a href="https://livepocket.jp/e/livste_nowloading2026" target="_blank">

<button class="ticketButton">
🎫 チケット購入はこちら
</button>

</a>

<br><br>

<button onclick="location.reload()">
🔄 もう一度聞く
</button>

</div>

<script>

const audioFile = "hojo_bro.wav";

const startBtn = document.getElementById("startBtn");
const player = document.getElementById("player");
const finish = document.getElementById("finish");

startBtn.addEventListener("click", function(){

    startBtn.style.display = "none";

    player.style.display = "block";

    player.src = audioFile + "?t=" + Date.now();

    player.load();

    player.play().catch(err=>{
        console.log(err);
    });

});

player.addEventListener("ended", function(){

    player.style.display = "none";

    finish.style.display = "block";

});

</script>

</body>
</html>
